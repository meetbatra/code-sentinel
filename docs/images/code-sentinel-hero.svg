<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF5EA"/>
      <stop offset="1" stop-color="#FFE7D0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="560" rx="28" fill="url(#bg)"/>

  <rect x="40" y="40" width="1120" height="480" rx="24" fill="url(#card)" stroke="#F1D3B2"/>

  <text x="80" y="120" fill="#5B2F13" font-family="Arial, sans-serif" font-size="48" font-weight="700">
    Code Sentinel
  </text>
  <text x="80" y="160" fill="#7A4B2A" font-family="Arial, sans-serif" font-size="24">
    Autonomous bug validation with backend + full-stack browser evidence
  </text>

  <rect x="80" y="210" width="250" height="190" rx="18" fill="#FFF" stroke="#EBC7A3"/>
  <text x="100" y="245" fill="#5B2F13" font-family="Arial, sans-serif" font-size="20" font-weight="700">1. Describe Bug</text>
  <text x="100" y="280" fill="#7A4B2A" font-family="Arial, sans-serif" font-size="16">Select repo, mode, scope</text>
  <text x="100" y="305" fill="#7A4B2A" font-family="Arial, sans-serif" font-size="16">Start a run from home</text>

  <rect x="475" y="210" width="250" height="190" rx="18" fill="#FFF" stroke="#EBC7A3"/>
  <text x="495" y="245" fill="#5B2F13" font-family="Arial, sans-serif" font-size="20" font-weight="700">2. Agent Tests</text>
  <text x="495" y="280" fill="#7A4B2A" font-family="Arial, sans-serif" font-size="16">Generate API test files</text>
  <text x="495" y="305" fill="#7A4B2A" font-family="Arial, sans-serif" font-size="16">Run browser edge cases</text>

  <rect x="870" y="210" width="250" height="190" rx="18" fill="#FFF" stroke="#EBC7A3"/>
  <text x="890" y="245" fill="#5B2F13" font-family="Arial, sans-serif" font-size="20" font-weight="700">3. Review Evidence</text>
  <text x="890" y="280" fill="#7A4B2A" font-family="Arial, sans-serif" font-size="16">Bugs, assertions, screenshots</text>
  <text x="890" y="305" fill="#7A4B2A" font-family="Arial, sans-serif" font-size="16">Download backend tests</text>

  <path d="M340 305 H455" stroke="#C7793F" stroke-width="4" stroke-linecap="round"/>
  <path d="M446 296 L460 305 L446 314" stroke="#C7793F" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M735 305 H850" stroke="#C7793F" stroke-width="4" stroke-linecap="round"/>
  <path d="M841 296 L855 305 L841 314" stroke="#C7793F" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="80" y="455" fill="#7A4B2A" font-family="Arial, sans-serif" font-size="18">
    Fast mode for quick signal. Deep mode for broader edge-case coverage.
  </text>
</svg>
